<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI RAG Chatbot</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .chat-container { width: 100%; max-width: 600px; background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 80vh; overflow: hidden; border: 1px solid #ddd; }
        #chatbox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 16px; border-radius: 15px; max-width: 85%; line-height: 1.5; font-size: 15px; }
        .user-msg { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
        .bot-msg { align-self: flex-start; background: #e9e9eb; color: #333; border-bottom-left-radius: 2px; }
        .input-area { border-top: 1px solid #eee; padding: 15px; display: flex; gap: 10px; background: #fff; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="chat-container">
    <div id="chatbox"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask about Machine Learning..." onkeypress="handleKeyPress(event)">
        <button id="sendBtn" onclick="askBot()">Send</button>
    </div>
</div>

<script>
    // These must be defined outside the function so they persist
    const API_URL = 'https://pg0klg3bgf.execute-api.eu-central-1.amazonaws.com/prod/ask'; 
    let currentSessionId = null; 

    // Helper for the Enter key
    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            askBot();
        }
    }

    async function askBot() {
        const inputField = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatbox = document.getElementById('chatbox');
        const question = inputField.value.trim();

        if (!question) return;

        // UI: Add User Message
        chatbox.innerHTML += `<div class="message user-msg">${question}</div>`;
        inputField.value = '';
        chatbox.scrollTop = chatbox.scrollHeight;

        // UI: Show Loading State
        sendBtn.disabled = true;
        sendBtn.innerText = "...";

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    question: question,
                    sessionId: currentSessionId 
                })
            });

            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

            const data = await response.json();
            
            // Unwrapping the Lambda Proxy response
            let bodyObj = data.body ? (typeof data.body === 'string' ? JSON.parse(data.body) : data.body) : data;
            const botText = bodyObj.answer || "I couldn't find an answer.";
            
            // Update Session Memory
            if (bodyObj.sessionId) {
                currentSessionId = bodyObj.sessionId;
            }

            // Render Bot Message
            chatbox.innerHTML += `<div class="message bot-msg">${marked.parse(botText)}</div>`;

        } catch (error) {
            console.error("Fetch error:", error);
            chatbox.innerHTML += `<div class="message bot-msg" style="color:red;">Error: ${error.message}</div>`;
        } finally {
            sendBtn.disabled = false;
            sendBtn.innerText = "Send";
            chatbox.scrollTop = chatbox.scrollHeight;
        }
    }
</script>
</body>
</html>
